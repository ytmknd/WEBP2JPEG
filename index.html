<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WEBP → JPEG 変換アプリ</title>
  <!-- JSZip: ZIP生成ライブラリ -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <!-- FileSaver.js: ファイル保存ライブラリ -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <!-- webp-hero: WebP非対応ブラウザ用ポリフィル -->
  <script src="https://unpkg.com/webp-hero@0.0.2/dist-cjs/polyfills.js"></script>
  <script src="https://unpkg.com/webp-hero@0.0.2/dist-cjs/webp-hero.bundle.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      background: linear-gradient(135deg, #f7f9fc 0%, #eaf2ff 100%);
      color: #1f2937;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 1100px;
      margin: 0 auto;
    }
    .card {
      background: rgba(255,255,255,0.97);
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      padding: 20px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      text-align: center;
    }
    .lead {
      text-align: center;
      margin: 0 0 18px;
      color: #4b5563;
      line-height: 1.7;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      align-items: center;
      margin-bottom: 18px;
    }
    label.select-label {
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
      background: #f3f4f6;
      padding: 10px 14px;
      border-radius: 12px;
    }
    select {
      border: none;
      background: white;
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      cursor: pointer;
    }
    .drop-zone {
      border: 3px dashed #60a5fa;
      border-radius: 20px;
      padding: 28px 16px;
      text-align: center;
      background: #f8fbff;
      transition: 0.2s ease;
      cursor: pointer;
    }
    .drop-zone.drag-over {
      background: #dbeafe;
      border-color: #2563eb;
      transform: scale(1.01);
    }
    .drop-zone p {
      margin: 8px 0;
      line-height: 1.7;
    }
    .drop-icon {
      font-size: 2.8rem;
    }
    .small {
      color: #6b7280;
      font-size: 0.95rem;
    }
    input[type="file"] { display: none; }
    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-top: 16px;
    }
    button.action-btn {
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      justify-content: center;
    }
    button.action-btn:hover:not(:disabled) { transform: translateY(-1px); }
    button.action-btn.primary { background: #2563eb; color: white; }
    button.action-btn.secondary { background: #10b981; color: white; }
    button.action-btn.gray { background: #6b7280; color: white; }
    button.action-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    
    .status-text {
      text-align: center;
      margin-top: 14px;
      font-weight: 700;
      min-height: 1.5em;
    }
    .preview-grid {
      margin-top: 22px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
    }
    .preview-item {
      background: white;
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: relative;
    }
    .preview-img-wrapper {
      width: 100%;
      aspect-ratio: 4 / 3;
      background: #f3f4f6;
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .preview-img-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #fff;
    }
    .preview-filename {
      font-weight: 700;
      word-break: break-all;
      font-size: 1rem;
    }
    .preview-meta {
      color: #6b7280;
      font-size: 0.92rem;
      line-height: 1.5;
    }
    .preview-actions {
      display: flex;
      gap: 8px;
      margin-top: auto;
    }
    .preview-actions button {
      border: none;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 4px;
      transition: 0.2s;
    }
    .preview-actions button.btn-download { background: #2563eb; color: white; }
    .preview-actions button.btn-remove { background: #fee2e2; color: #dc2626; flex: 0 0 auto; }
    .preview-actions button:hover:not(:disabled) { opacity: 0.9; }

    /* プログレスバー */
    .progress-container {
      margin-top: 16px;
      display: none;
    }
    .progress-container.visible {
      display: block;
    }
    .progress-bar-bg {
      width: 100%;
      height: 8px;
      background: #e8e8f0;
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: #2563eb;
      border-radius: 4px;
      transition: width 0.3s ease;
      width: 0%;
    }
    .progress-text {
      font-size: 0.85rem;
      color: #6b7280;
      margin-top: 6px;
      text-align: center;
      font-weight: 600;
    }

    .footer-note {
      text-align: center;
      color: #6b7280;
      margin-top: 18px;
      font-size: 0.92rem;
      line-height: 1.6;
    }
    @media (max-width: 640px) {
      .container { padding: 12px; }
      .card { padding: 16px; }
      .drop-zone { padding: 24px 12px; }
      button.action-btn { width: 100%; }
      .button-row { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>WEBP → JPEG 変換アプリ</h1>
      <p class="lead">
        WEBP画像をドラッグするだけで、簡単にJPEGへ変換できます。<br>
        複数ファイル対応・個別保存・まとめてZIP保存にも対応しています。<br>
        すべての処理はブラウザ内で完結し、画像がサーバーに送信されることはありません。
      </p>

      <!-- 画質セレクト -->
      <div class="controls">
        <label class="select-label" for="quality">
          JPEG画質
          <select id="quality">
            <option value="95">高画質</option>
            <option value="85" selected>中画質</option>
            <option value="60">低画質</option>
          </select>
        </label>
      </div>

      <!-- ドロップゾーン -->
      <div class="drop-zone" id="dropZone">
        <div class="drop-icon">🖼️</div>
        <p><strong>ここにWEBPファイルをドラッグ＆ドロップ</strong></p>
        <p>またはクリックして選択</p>
        <p class="small">複数のWEBP画像をまとめて変換できます</p>
        <input type="file" id="fileInput" accept=".webp,image/webp" multiple>
      </div>

      <!-- アクションボタン -->
      <div class="button-row" id="actionsBar">
        <button class="action-btn primary" id="convertBtn" disabled>
          JPEGに変換
        </button>
        <button class="action-btn secondary" id="zipBtn" disabled>
          まとめてZIPダウンロード
        </button>
        <button class="action-btn gray" id="clearBtn" disabled>
          クリア
        </button>
      </div>

      <!-- プレビューエリア -->
      <div class="preview-area" id="previewArea" style="display:none;">
        <!-- プログレスバー -->
        <div class="progress-container" id="progressContainer">
          <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progressBar"></div>
          </div>
          <div class="progress-text" id="progressText"></div>
        </div>

        <div class="preview-grid" id="previewGrid"></div>
      </div>

      <div class="footer-note">
        すべての変換処理はブラウザ内（クライアントサイド）で行われます。<br>
        画像がサーバーにアップロードされることはありません。<br>
        WebP非対応ブラウザでもポリフィルにより動作します。
      </div>
    </div>
  </div>

  <script>
    (() => {
      'use strict';

      // ---- 要素参照 ----
      const dropZone = document.getElementById('dropZone');
      const fileInput = document.getElementById('fileInput');
      const qualitySelect = document.getElementById('quality');
      const previewArea = document.getElementById('previewArea');
      const previewGrid = document.getElementById('previewGrid');
      const convertBtn = document.getElementById('convertBtn');
      const zipBtn = document.getElementById('zipBtn');
      const clearBtn = document.getElementById('clearBtn');
      const progressContainer = document.getElementById('progressContainer');
      const progressBar = document.getElementById('progressBar');
      const progressText = document.getElementById('progressText');

      // ---- 状態管理 ----
      let files = []; // { file, id, status, blob, objectUrl, previewUrl }

      let idCounter = 0;

      // ---- WebP デコード可否チェック ----
      let canDecodeWebpNatively = false;
      const testWebP = new Image();
      testWebP.onload = () => { canDecodeWebpNatively = (testWebP.width > 0); };
      testWebP.onerror = () => { canDecodeWebpNatively = false; };
      testWebP.src = 'data:image/webp;base64,UklGRiIAAABXRUJQVlA4IBYAAAAwAQCdASoBAAEADsD+JaQAA3AAAAAA';

      // ---- 画質プルダウン（特別なイベント不要） ----

      // ---- ドラッグ＆ドロップ ----
      dropZone.addEventListener('click', () => fileInput.click());

      dropZone.addEventListener('dragover', e => {
        e.preventDefault();
        dropZone.classList.add('drag-over');
      });

      dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('drag-over');
      });

      dropZone.addEventListener('drop', e => {
        e.preventDefault();
        dropZone.classList.remove('drag-over');
        const droppedFiles = Array.from(e.dataTransfer.files).filter(f =>
          f.type === 'image/webp' || f.name.toLowerCase().endsWith('.webp')
        );
        if (droppedFiles.length > 0) {
          addFiles(droppedFiles);
        }
      });

      fileInput.addEventListener('change', () => {
        const selected = Array.from(fileInput.files).filter(f =>
          f.type === 'image/webp' || f.name.toLowerCase().endsWith('.webp')
        );
        if (selected.length > 0) {
          addFiles(selected);
        }
        fileInput.value = '';
      });

      // ---- ファイル追加 ----
      function addFiles(newFiles) {
        for (const f of newFiles) {
          const id = ++idCounter;
          const entry = {
            file: f,
            id: id,
            status: 'waiting',  // waiting | converting | done | error
            blob: null,
            objectUrl: null,
            previewUrl: URL.createObjectURL(f)
          };
          files.push(entry);
        }
        renderPreviews();
        updateButtons();
      }

      // ---- プレビュー描画 ----
      function renderPreviews() {
        previewArea.style.display = files.length > 0 ? 'block' : 'none';
        previewGrid.innerHTML = '';

        for (const entry of files) {
          const item = document.createElement('div');
          item.className = 'preview-item';
          item.dataset.id = entry.id;

          const imgWrapper = document.createElement('div');
          imgWrapper.className = 'preview-img-wrapper';
          const img = document.createElement('img');
          // 変換済みならJPEG、そうでなければ元のWEBP
          img.src = entry.objectUrl || entry.previewUrl;
          img.alt = entry.file.name;
          img.loading = 'lazy';
          imgWrapper.appendChild(img);

          const info = document.createElement('div');
          info.className = 'preview-meta'; // Updated mapping

          const filename = document.createElement('div');
          filename.className = 'preview-filename';
          filename.textContent = entry.file.name;

          const sizeDiv = document.createElement('div');
          sizeDiv.className = 'preview-meta';
          sizeDiv.textContent = formatSize(entry.file.size);
          if (entry.blob) {
            sizeDiv.textContent += ' → ' + formatSize(entry.blob.size);
          }

          const status = document.createElement('div');
          status.className = 'preview-meta'; // status style fallback
          switch (entry.status) {
            case 'waiting':
              status.textContent = '⏳ 待機中';
              break;
            case 'converting':
              status.innerHTML = '🔄 変換中…'; // Simplified
              break;
            case 'done':
              status.textContent = '✅ 変換完了';
              status.style.color = '#10b981';
              break;
            case 'error':
              status.textContent = '❌ エラー';
              status.style.color = '#dc2626';
              break;
          }

          const actions = document.createElement('div');
          actions.className = 'preview-actions';

          if (entry.status === 'done' && entry.objectUrl) {
            const dlBtn = document.createElement('button');
            dlBtn.className = 'btn-download';
            dlBtn.textContent = '💾 保存';
            dlBtn.addEventListener('click', () => downloadSingle(entry));
            actions.appendChild(dlBtn);
          }

          const removeBtn = document.createElement('button');
          removeBtn.className = 'btn-remove';
          removeBtn.textContent = '✕';
          removeBtn.addEventListener('click', () => {
            removeFile(entry.id);
          });
          actions.appendChild(removeBtn);

          info.appendChild(filename);
          info.appendChild(sizeDiv);
          info.appendChild(status);
          info.appendChild(actions);

          item.appendChild(imgWrapper);
          item.appendChild(info);
          previewGrid.appendChild(item);
        }

        // WebP非対応ブラウザ向けにポリフィルを適用
        applyWebpPolyfill();
      }

      // ---- WebP ポリフィル適用 ----
      function applyWebpPolyfill() {
        if (!canDecodeWebpNatively && window.webpHero && window.webpHero.WebpMachine) {
          try {
            const webpMachine = new window.webpHero.WebpMachine();
            webpMachine.polyfillDocument();
          } catch (e) {
            // ポリフィル適用失敗 — サイレントに無視
          }
        }
      }

      // ---- ボタン状態更新 ----
      function updateButtons() {
        const hasFiles = files.length > 0;
        const hasWaiting = files.some(f => f.status === 'waiting');
        const hasDone = files.some(f => f.status === 'done');

        convertBtn.disabled = !hasWaiting;
        zipBtn.disabled = !hasDone;
        clearBtn.disabled = !hasFiles;
      }

      // ---- 変換処理 ----
      convertBtn.addEventListener('click', startConversion);

      async function startConversion() {
        const quality = parseInt(qualitySelect.value, 10) / 100;
        const toConvert = files.filter(f => f.status === 'waiting');
        if (toConvert.length === 0) return;

        convertBtn.disabled = true;
        progressContainer.classList.add('visible');
        let done = 0;
        const total = toConvert.length;
        updateProgress(done, total);

        for (const entry of toConvert) {
          entry.status = 'converting';
          renderPreviews();

          try {
            const blob = await convertWebpToJpeg(entry.file, quality);
            entry.blob = blob;
            if (entry.objectUrl) URL.revokeObjectURL(entry.objectUrl);
            entry.objectUrl = URL.createObjectURL(blob);
            entry.status = 'done';
          } catch (err) {
            console.error('変換エラー:', entry.file.name, err);
            entry.status = 'error';
          }

          done++;
          updateProgress(done, total);
          renderPreviews();
        }

        updateButtons();

        setTimeout(() => {
          progressContainer.classList.remove('visible');
        }, 2000);
      }

      function updateProgress(done, total) {
        const pct = total > 0 ? Math.round((done / total) * 100) : 0;
        progressBar.style.width = pct + '%';
        progressText.textContent = `${done} / ${total} 完了 (${pct}%)`;
      }

      // ---- WebP → JPEG 変換（Canvas方式 + フォールバック） ----
      function convertWebpToJpeg(file, quality) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = async (e) => {
            const arrayBuffer = e.target.result;
            const dataUrl = arrayBufferToDataUrl(arrayBuffer, 'image/webp');

            // まずネイティブ canvas で変換を試みる
            try {
              const blob = await convertViaCanvas(dataUrl, quality);
              if (blob && blob.size > 0) {
                resolve(blob);
                return;
              }
            } catch (_) {
              // ネイティブ失敗 → フォールバック
            }

            // webp-hero ポリフィルでデコードを試みる
            try {
              const blob = await convertViaWebpHero(arrayBuffer, quality);
              resolve(blob);
            } catch (err2) {
              reject(new Error('変換に失敗しました: ' + err2.message));
            }
          };
          reader.onerror = () => reject(new Error('ファイルの読み込みに失敗しました'));
          reader.readAsArrayBuffer(file);
        });
      }

      // Canvas方式
      function convertViaCanvas(dataUrl, quality) {
        return new Promise((resolve, reject) => {
          const img = new Image();
          img.onload = () => {
            try {
              const canvas = document.createElement('canvas');
              canvas.width = img.naturalWidth;
              canvas.height = img.naturalHeight;
              const ctx = canvas.getContext('2d');
              // JPEG は透過非対応なので白背景
              ctx.fillStyle = '#FFFFFF';
              ctx.fillRect(0, 0, canvas.width, canvas.height);
              ctx.drawImage(img, 0, 0);
              canvas.toBlob(
                blob => {
                  if (blob) resolve(blob);
                  else reject(new Error('toBlob returned null'));
                },
                'image/jpeg',
                quality
              );
            } catch (err) {
              reject(err);
            }
          };
          img.onerror = () => reject(new Error('Image decode failed'));
          img.src = dataUrl;
        });
      }

      // webp-hero フォールバック
      async function convertViaWebpHero(arrayBuffer, quality) {
        if (!window.webpHero || !window.webpHero.WebpMachine) {
          throw new Error('webp-hero が利用できません');
        }
        const webpMachine = new window.webpHero.WebpMachine();
        const uint8 = new Uint8Array(arrayBuffer);
        const pngDataUrl = await webpMachine.decode(uint8);

        // PNGとしてデコードされたものをさらにcanvas経由でJPEGに変換
        return new Promise((resolve, reject) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0);
            canvas.toBlob(
              blob => {
                if (blob) resolve(blob);
                else reject(new Error('toBlob returned null'));
              },
              'image/jpeg',
              quality
            );
          };
          img.onerror = () => reject(new Error('Polyfill image decode failed'));
          img.src = pngDataUrl;
        });
      }

      // ArrayBuffer → Data URL
      function arrayBufferToDataUrl(buffer, mime) {
        let binary = '';
        const bytes = new Uint8Array(buffer);
        const chunkSize = 8192;
        for (let i = 0; i < bytes.length; i += chunkSize) {
          binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunkSize));
        }
        return 'data:' + mime + ';base64,' + btoa(binary);
      }

      // ---- 個別ダウンロード ----
      function downloadSingle(entry) {
        if (!entry.blob) return;
        const name = entry.file.name.replace(/\.webp$/i, '') + '.jpg';
        saveAs(entry.blob, name);
      }

      // ---- ZIPダウンロード ----
      zipBtn.addEventListener('click', async () => {
        const doneFiles = files.filter(f => f.status === 'done' && f.blob);
        if (doneFiles.length === 0) return;

        zipBtn.disabled = true;
        zipBtn.textContent = '⏳ ZIP作成中…';

        try {
          const zip = new JSZip();
          for (const entry of doneFiles) {
            const name = entry.file.name.replace(/\.webp$/i, '') + '.jpg';
            zip.file(name, entry.blob);
          }
          const content = await zip.generateAsync({
            type: 'blob',
            compression: 'DEFLATE',
            compressionOptions: { level: 6 }
          });
          saveAs(content, 'webp_to_jpeg.zip');
        } catch (err) {
          console.error('ZIP生成エラー:', err);
          alert('ZIPの生成に失敗しました。');
        }

        zipBtn.textContent = '📦 まとめてZIPダウンロード';
        updateButtons();
      });

      // ---- クリア ----
      clearBtn.addEventListener('click', () => {
        for (const entry of files) {
          if (entry.previewUrl) URL.revokeObjectURL(entry.previewUrl);
          if (entry.objectUrl) URL.revokeObjectURL(entry.objectUrl);
        }
        files = [];
        renderPreviews();
        updateButtons();
        progressContainer.classList.remove('visible');
      });

      // ---- ファイル個別削除 ----
      function removeFile(id) {
        const idx = files.findIndex(f => f.id === id);
        if (idx === -1) return;
        const entry = files[idx];
        if (entry.previewUrl) URL.revokeObjectURL(entry.previewUrl);
        if (entry.objectUrl) URL.revokeObjectURL(entry.objectUrl);
        files.splice(idx, 1);
        renderPreviews();
        updateButtons();
      }

      // ---- ユーティリティ ----
      function formatSize(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
        return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
      }

      // テスト用API公開
      if (location.search.includes('test')) {
        window.__APP__ = { formatSize, convertWebpToJpeg, arrayBufferToDataUrl };
      }

    })();
  </script>
</body>
</html>
