<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>WEBP to JPEG Converter - Tests</title>
  <!-- Mocha CSS -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/mocha/10.2.0/mocha.min.css" rel="stylesheet" />
  <style>
    body { font-family: sans-serif; padding: 20px; }
  </style>
</head>
<body>
  <h1>WEBP → JPEG 変換アプリ 単体テスト</h1>
  <div id="mocha"></div>

  <!-- Mocha / Chai -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mocha/10.2.0/mocha.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chai/4.3.7/chai.min.js"></script>

  <!-- 隠しiframeでindex.html（テストモード）をロード -->
  <iframe id="appFrame" src="index.html?test=1" style="display:none;"></iframe>

  <script>
    // Mochaの初期化
    mocha.setup('bdd');
    const expect = chai.expect;

    const iframe = document.getElementById('appFrame');

    iframe.onload = () => {
      const appWindow = iframe.contentWindow;
      const app = appWindow.__APP__;

      describe('ユーティリティ関数のテスト', () => {

        it('formatSize() が正しい単位でバイト数をフォーマットできること', () => {
          expect(app.formatSize(500)).to.equal('500 B');
          expect(app.formatSize(1024)).to.equal('1.0 KB');
          expect(app.formatSize(1536)).to.equal('1.5 KB');
          expect(app.formatSize(1048576)).to.equal('1.00 MB');
          expect(app.formatSize(1572864)).to.equal('1.50 MB');
        });

        it('arrayBufferToDataUrl() が正しくBase64のData URLを生成できること', () => {
          // 'RIFF' のASCIIコード
          const buffer = new Uint8Array([82, 73, 70, 70]).buffer;
          const url = app.arrayBufferToDataUrl(buffer, 'image/webp');
          expect(url).to.equal('data:image/webp;base64,UklGRg==');
        });

      });

      describe('WEBP変換処理のテスト', () => {

        it('convertWebpToJpeg() がJPEGのBlobを返すこと', async () => {
          // 最小構成の透明な1x1 WEBPのBase64文字列
          const webpBase64 = 'UklGRiIAAABXRUJQVlA4IBYAAAAwAQCdASoBAAEADsD+JaQAA3AAAAAA';
          const binary = atob(webpBase64);
          const array = new Uint8Array(binary.length);
          for (let i = 0; i < binary.length; i++) {
            array[i] = binary.charCodeAt(i);
          }
          
          // IFrame内のFileオブジェクトを使ってファイルを作成
          const file = new appWindow.File([array.buffer], 'test.webp', { type: 'image/webp' });

          // 画質0.92 (92%) で変換
          const blob = await app.convertWebpToJpeg(file, 0.92);
          
          expect(blob).to.be.an.instanceOf(appWindow.Blob);
          expect(blob.type).to.equal('image/jpeg');
          expect(blob.size).to.be.greaterThan(0);
        });

      });

      describe('負荷テスト', () => {
        it('100個のWEBPファイルを並列で変換できること', async function() {
          this.timeout(10000); // 処理時間がかかる可能性があるためタイムアウトを長めに設定(10秒)
          
          // 最小構成の透明な1x1 WEBPのBase64文字列
          const webpBase64 = 'UklGRiIAAABXRUJQVlA4IBYAAAAwAQCdASoBAAEADsD+JaQAA3AAAAAA';
          const binary = atob(webpBase64);
          const array = new Uint8Array(binary.length);
          for (let i = 0; i < binary.length; i++) {
            array[i] = binary.charCodeAt(i);
          }
          
          const file = new appWindow.File([array.buffer], 'test.webp', { type: 'image/webp' });
          const count = 100;
          const promises = [];
          
          for (let i = 0; i < count; i++) {
            promises.push(app.convertWebpToJpeg(file, 0.92));
          }
          
          const start = performance.now();
          const results = await Promise.all(promises);
          const end = performance.now();
          
          expect(results).to.have.lengthOf(count);
          results.forEach(blob => {
            expect(blob).to.be.an.instanceOf(appWindow.Blob);
            expect(blob.type).to.equal('image/jpeg');
            expect(blob.size).to.be.greaterThan(0);
          });
          
          console.log(`負荷テスト（100個の変換）完了時間: ${(end - start).toFixed(2)}ms`);
        });
      });

      // テストの実行
      mocha.run();
    };
  </script>
</body>
</html>
